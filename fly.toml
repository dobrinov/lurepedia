# fly.toml — Lurepedia on Fly.io
# Single always-on machine backed by a persistent volume for the SQLite databases.
# SQLite cannot be shared across machines: do NOT scale this app above 1 machine.

app = "lurepedia"
primary_region = "lhr"

[build]

[env]
  RAILS_ENV = "production"
  # Solid Queue runs inside Puma, so the machine must stay up for jobs to run.
  SOLID_QUEUE_IN_PUMA = "true"
  # The container runs as non-root (uid 1000) and cannot bind the privileged
  # port 80, so have Thruster listen on a high port. It still proxies to Puma
  # on TARGET_PORT (3000) under the hood.
  HTTP_PORT = "8080"

[http_service]
  internal_port = 8080        # Thruster (bin/thrust) listens here
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "off"  # always-on so background jobs keep processing
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

[checks]
  [checks.health]
    type = "http"
    port = 8080
    path = "/up"
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"

[[vm]]
  # Single machine, sized up for headroom: browse traffic plus the in-Puma
  # Solid Queue analyze jobs (CPU-heavy image processing during catalog imports).
  # Still ONE machine — see the SQLite note at the top; do not raise the count.
  size = "shared-cpu-2x"
  memory = "4gb"

# Persistent storage for the SQLite databases (primary, cache, queue, cable)
# and any local Active Storage uploads. Without this, the database is wiped on
# every deploy. Create it once with:
#   fly volumes create lurepedia_data --region lhr --size 1
[mounts]
  source = "lurepedia_data"
  destination = "/rails/storage"
