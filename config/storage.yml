test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# Tigris object storage (S3-compatible), provisioned via `fly storage create`.
# The AWS_* / BUCKET_NAME env vars are Fly secrets set by that command.
# `public: true` makes Active Storage upload objects with public-read and
# generate permanent, cacheable URLs instead of expiring signed ones.
tigris:
  service: S3
  access_key_id: <%= ENV["AWS_ACCESS_KEY_ID"] %>
  secret_access_key: <%= ENV["AWS_SECRET_ACCESS_KEY"] %>
  endpoint: <%= ENV["AWS_ENDPOINT_URL_S3"] %>
  region: <%= ENV["AWS_REGION"] %>
  bucket: <%= ENV["BUCKET_NAME"] %>
  public: true
