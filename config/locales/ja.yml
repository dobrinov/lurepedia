  species_names:
    largemouth_bass:
      common: ラージマウスバス
      habitat: 水草の多い温かい湖や池。カバー周りで待ち伏せする捕食者。
    smallmouth_bass:
      common: スモールマウスバス
      habitat: 冷たく澄んだ川や岩場の湖。強い引きが特徴。
    northern_pike:
      common: ノーザンパイク
      habitat: 水草の茂る入り江や冷たい湖。攻撃的な待ち伏せ型捕食者。
    walleye:
      common: ウォールアイ
      habitat: 深く冷たい湖や川。薄暗い時間に捕食する。
    yellow_perch:
      common: イエローパーチ
      habitat: 湖や池の群れ魚。底付近で捕食する。
    muskellunge:
      common: マスキー
      habitat: 大きく澄んだ湖や川。淡水の頂点捕食者。
    bluegill:
      common: ブルーギル
      habitat: 温かい池や浅瀬。集団で営巣する。
    rainbow_trout:
      common: ニジマス
      habitat: 冷たい渓流・川・湖。人気の高い対象魚。
    mahi_mahi:
      common: シイラ
