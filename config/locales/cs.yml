  species_names:
    largemouth_bass:
      common: Okounek pstruhový
      habitat: Teplá, zarostlá jezera a rybníky; útočí ze zálohy u překážek.
    smallmouth_bass:
      common: Okounek černý
      habitat: Chladné, čisté řeky a kamenitá jezera; skvělý bojovník.
    northern_pike:
      common: Štika obecná
      habitat: Zarostlé zátoky a chladná jezera; agresivní predátor útočící ze zálohy.
    walleye:
      common: Candát americký
      habitat: Hluboká, chladná jezera a řeky; loví za šera.
    yellow_perch:
      common: Okoun žlutý
      habitat: Hejnová ryba jezer a rybníků; potravu sbírá u dna.
    muskellunge:
      common: Štika muskalunga
      habitat: Velká čistá jezera a řeky; vrcholový sladkovodní predátor.
    bluegill:
      common: Slunečnice pestrá
      habitat: Teplé rybníky a mělčiny jezer; hnízdí v koloniích.
    rainbow_trout:
      common: Pstruh duhový
      habitat: Studené potoky, řeky a jezera; ceněná sportovní ryba.
    mahi_mahi:
      common: Zlak nachový
      habitat: Teplé povrchové vody oceánů; rychlý pelagický predátor.
    striped_bass:
      common: Mořčák pruhovaný
      habitat: Pobřežní příboj, ústí řek a velké řeky; tažná ryba.
    bonefish:
      common: Albula liščí
      habitat: Tropické mělčiny; plachá a rychlá.
    chinook_salmon:
      common: Losos čavyča
      habitat: Studené pacifické řeky a jezera; silná tažná ryba.
