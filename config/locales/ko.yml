    smallmouth_bass:
      common: 스몰마우스 배스
      habitat: 차고 맑은 강과 바위가 많은 호수에 서식하며, 힘이 좋은 파이터입니다.
    northern_pike:
      common: 노던 파이크
      habitat: 수초가 우거진 만과 차가운 호수에 서식하는 공격적인 매복 포식자입니다.
    walleye:
      common: 월아이
      habitat: 깊고 차가운 호수와 강에 서식하며, 어두울 때 먹이 활동을 합니다.
    yellow_perch:
      common: 옐로 퍼치
      habitat: 호수와 연못에서 무리를 짓는 어종으로, 바닥 근처에서 먹이 활동을 합니다.
    muskellunge:
      common: 머스킬런지
      habitat: 크고 맑은 호수와 강에 서식하는 민물 최상위 포식자입니다.
    bluegill:
      common: 블루길
      habitat: 따뜻한 연못과 호수 얕은 곳에 서식하며, 무리를 지어 산란합니다.
    rainbow_trout:
      common: 무지개송어
      habitat: 차가운 계류, 강, 호수에 서식하는 인기 스포츠 피시입니다.
    mahi_mahi:
      common: 만새기
      habitat: 따뜻한 외해 표층에 서식하는 빠른 원양 포식자입니다.
    striped_bass:
      common: 스트라이프드 배스
      habitat: 연안 서프, 하구, 큰 강에 서식하는 회유성 어종입니다.
    bonefish:
      common: 본피시
      habitat: 열대의 얕은 플랫에 서식하며, 경계심이 강하고 빠릅니다.
    chinook_salmon:
      common: 왕연어
      habitat: 차가운 태평양 연안의 강과 호수에 서식하는 힘센 회유성 어종입니다.
