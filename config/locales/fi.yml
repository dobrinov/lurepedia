  species_names:
    largemouth_bass:
      common: Isobassi
      habitat: Lämpimät, runsaskasvustoiset järvet ja lammet; väijyvä peto suojapaikkojen tuntumassa.
    smallmouth_bass:
      common: Pikkubassi
      habitat: Viileät, kirkkaat joet ja kivikkoiset järvet; kova vastustaja.
    northern_pike:
      common: Hauki
      habitat: Ruohoiset lahdet ja viileät järvet; aggressiivinen väijyvä peto.
    walleye:
      common: Valkosilmäkuha
      habitat: Syvät, viileät järvet ja joet; syö hämärän aikaan.
    yellow_perch:
      common: Keltaahven
      habitat: Järvien ja lampien parvikala; syö läheltä pohjaa.
    muskellunge:
      common: Jättihauki
      habitat: Suuret kirkkaat järvet ja joet; makean veden huippupeto.
    bluegill:
      common: Isoaurinkoahven
      habitat: Lämpimät lammet ja järvien matalikot; pesii yhdyskunnissa.
    rainbow_trout:
      common: Kirjolohi
      habitat: Kylmät purot, joet ja järvet; arvostettu urheilukala.
    mahi_mahi:
      common: Dolfiini
      habitat: Lämpimät avomeren pintavedet; nopea ulapan peto.
    striped_bass:
      common: Juovabassi
      habitat: Rannikon tyrskyt, jokisuistot ja suuret joet; vaeltava laji.
    bonefish:
      common: Bonefish
      habitat: Trooppiset matalat flatsit; arka ja nopea.
    chinook_salmon:
      common: Kuningaslohi
      habitat: Kylmät Tyynenmeren joet ja järvet; voimakas vaeltava kala.
