      habitat: Прохладные прозрачные реки и каменистые озёра; сильный боец.
    northern_pike:
      common: Щука
      habitat: Заросшие заливы и прохладные озёра; агрессивный засадный хищник.
    walleye:
      common: Светлопёрый судак
      habitat: Глубокие прохладные озёра и реки; кормится при слабом освещении.
    yellow_perch:
      common: Жёлтый окунь
