    striped_bass:
      common: Полосатый лаврак
      habitat: Прибрежный прибой, эстуарии и крупные реки; мигрирующий вид.
    bonefish:
      common: Альбула
      habitat: Тропические мелководные отмели; осторожная и быстрая.
    chinook_salmon:
      common: Чавыча
      habitat: Холодные тихоокеанские реки и озёра; мощная проходная рыба.
