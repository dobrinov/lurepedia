  species_names:
    largemouth_bass:
      common: 大口黑鲈
      habitat: 温暖多水草的湖泊和池塘；喜在障碍物附近伏击猎物。
    smallmouth_bass:
      common: 小口黑鲈
      habitat: 清凉澄澈的河流和多岩石的湖泊；搏击力强。
    northern_pike:
      common: 白斑狗鱼
      habitat: 多水草的湖湾和冷水湖泊；凶猛的伏击型掠食者。
    walleye:
      common: 大眼狮鲈
      habitat: 幽深清凉的湖泊和河流；喜在弱光时觅食。
    yellow_perch:
      common: 黄鲈
      habitat: 湖泊和池塘中的群游鱼；在近底层觅食。
    muskellunge:
      common: 北美狗鱼
      habitat: 大型清澈的湖泊和河流；淡水中的顶级掠食者。
    bluegill:
      common: 蓝鳃太阳鱼
      habitat: 温暖的池塘和湖泊浅水区；群体筑巢。
    rainbow_trout:
      common: 虹鳟
      habitat: 寒冷的溪流、河流和湖泊；备受青睐的游钓鱼种。
    mahi_mahi:
      common: 鲯鳅
      habitat: 温暖的近海表层水域；速度极快的大洋掠食者。
    striped_bass:
      common: 条纹鲈
      habitat: 沿岸拍岸浪区、河口和大河；洄游性鱼类。
    bonefish:
      common: 北梭鱼
      habitat: 热带浅滩；警觉且迅捷。
    chinook_salmon:
      common: 帝王鲑
      habitat: 寒冷的太平洋水系河流和湖泊；力量强劲的洄游鱼。
