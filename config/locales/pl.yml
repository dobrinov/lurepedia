  species_names:
    largemouth_bass:
      common: Bass wielkogębowy
      habitat: Ciepłe, zarośnięte jeziora i stawy; drapieżnik polujący z zasadzki przy przeszkodach.
    smallmouth_bass:
      common: Bass małogębowy
      habitat: Chłodne, czyste rzeki i kamieniste jeziora; wyjątkowo waleczny przeciwnik.
    northern_pike:
      common: Szczupak
      habitat: Zarośnięte zatoki i chłodne jeziora; agresywny drapieżnik polujący z zasadzki.
    walleye:
      common: Sandacz amerykański
      habitat: Głębokie, chłodne jeziora i rzeki; żeruje przy słabym świetle.
    yellow_perch:
      common: Okoń żółty
      habitat: Ryba stadna jezior i stawów; żeruje przy dnie.
    muskellunge:
      common: Muskellunge
      habitat: Duże, czyste jeziora i rzeki; szczytowy drapieżnik wód słodkich.
    bluegill:
      common: Bluegill
      habitat: Ciepłe stawy i płycizny jezior; gniazduje w koloniach.
    rainbow_trout:
      common: Pstrąg tęczowy
      habitat: Zimne strumienie, rzeki i jeziora; ceniona ryba sportowa.
    mahi_mahi:
      common: Mahi-Mahi
      habitat: Ciepłe wody powierzchniowe otwartego oceanu; szybki drapieżnik pelagiczny.
    striped_bass:
      common: Bass prążkowany
      habitat: Przybrzeżny przybój, estuaria i duże rzeki; ryba wędrowna.
    bonefish:
      common: Bonefish
      habitat: Tropikalne płytkie równie pływowe; płochliwa i bardzo szybka.
    chinook_salmon:
      common: Czawycza
      habitat: Zimne rzeki i jeziora zlewiska Pacyfiku; silna ryba wędrowna.
