  species_names:
    largemouth_bass:
      common: Forellenbarsch
      habitat: Warme, bewachsene Seen und Teiche; Lauerräuber in Deckung.
    smallmouth_bass:
      common: Schwarzbarsch
      habitat: Kühle, klare Flüsse und felsige Seen; starker Kämpfer.
    northern_pike:
      common: Hecht
      habitat: Verkrautete Buchten und kühle Seen; aggressiver Lauerräuber.
    walleye:
      common: Zander
      habitat: Tiefe, kühle Seen und Flüsse; jagt bei wenig Licht.
    yellow_perch:
      common: Flussbarsch
      habitat: Schwarmfisch in Seen und Teichen; frisst nahe dem Grund.
    muskellunge:
      common: Muskellunge
      habitat: Große klare Seen und Flüsse; Spitzenräuber im Süßwasser.
    bluegill:
      common: Blauer Sonnenbarsch
      habitat: Warme Teiche und Flachwasser; nistet in Kolonien.
    rainbow_trout:
      common: Regenbogenforelle
      habitat: Kalte Bäche, Flüsse und Seen; begehrter Sportfisch.
    mahi_mahi:
      common: Mahi-Mahi
      habitat: Warme Hochsee-Oberflächen; schneller pelagischer Räuber.
    striped_bass:
      common: Streifenbarsch
      habitat: Küstenbrandung, Mündungen und große Flüsse; wandernd.
    bonefish:
      common: Grätenfisch
      habitat: Tropische Flachwasserzonen; scheu und schnell.
    chinook_salmon:
      common: Königslachs
      habitat: Kalte pazifische Flüsse und Seen; kraftvoller Wanderfisch.

