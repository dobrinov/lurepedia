  species_names:
    largemouth_bass:
      common: Голямоуст костур
      habitat: Топли, обрасли езера и язове; хищник от засада край укрития.
    smallmouth_bass:
      common: Малкоуст костур
      habitat: Хладни, бистри реки и скалисти езера; силен борец.
    northern_pike:
      common: Щука
      habitat: Обрасли заливи и хладни езера; агресивен хищник от засада.
    walleye:
      common: Американски бяс
      habitat: Дълбоки, хладни езера и реки; храни се при слаба светлина.
    yellow_perch:
      common: Жълт костур
      habitat: Стадна риба в езера и язове; храни се край дъното.
    muskellunge:
      common: Маскинонг
      habitat: Големи бистри езера и реки; върховен сладководен хищник.
    bluegill:
      common: Син слънчев костур
      habitat: Топли язове и плитчини; гнезди на колонии.
    rainbow_trout:
      common: Дъгова пъстърва
      habitat: Студени потоци, реки и езера; ценена спортна риба.
    mahi_mahi:
      common: Махи-махи
      habitat: Топли открити повърхностни води; бърз пелагичен хищник.
    striped_bass:
      common: Раиран лаврак
      habitat: Крайбрежен прибой, устия и големи реки; мигриращ.
    bonefish:
      common: Кокалена риба
      habitat: Тропически плитки зони; плашлива и бърза.
    chinook_salmon:
      common: Чинук
      habitat: Студени тихоокеански реки и езера; мощна мигрираща риба.
